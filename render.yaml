services:
  - type: web
    name: agentic-growth-os-backend
    runtime: python
    repo: https://github.com/Yash282802/agentic-growth-os
    plan: free
    branch: master
    rootDir: backend
    healthCheckPath: /
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DEBUG
        value: "false"
